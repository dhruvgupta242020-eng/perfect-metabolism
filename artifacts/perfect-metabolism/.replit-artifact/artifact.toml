kind = "web"
previewPath = "/"
title = "Perfect Metabolism"
version = "1.0.0"
id = "artifacts/perfect-metabolism"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20374

[services.development]
run = "pnpm --filter @workspace/perfect-metabolism run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/perfect-metabolism", "run", "build" ]
publicDir = "artifacts/perfect-metabolism/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20374"
BASE_PATH = "/"
